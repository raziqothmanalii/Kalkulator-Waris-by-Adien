<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Waris by Adien - Beta Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --bg: #fcfcfd; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #0f172a; overflow-x: hidden; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .input-rupiah { width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.2s; font-size: 0.95rem; }
        .input-rupiah:focus { border-color: var(--primary); background: #f8faff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .tab-active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-inactive { background: #f1f5f9; color: #64748b; }
        .btn-prime { background: var(--primary); color: white; font-weight: 800; padding: 18px; border-radius: 16px; width: 100%; transition: 0.3s; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-prime:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .res-item { border-left: 5px solid #e2e8f0; animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .gol-prio { border-left-color: #10b981; } 
        .gol-ashaba { border-left-color: #f59e0b; } 

        #welcomeOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 24px; }
    </style>
</head>
<body>

    <div id="welcomeOverlay">
        <div class="bg-white max-w-lg w-full rounded-[32px] p-8 md:p-12 text-center shadow-2xl animate-in zoom-in duration-300">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">🏛️</div>
            <h2 class="text-2xl font-black mb-4 tracking-tight">Kalkulator Waris by Adien</h2>
            
            <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 mb-6 text-left">
                <p class="text-[10px] font-black text-amber-600 uppercase mb-1 tracking-widest">⚠️ BETA EDITION</p>
                <p class="text-xs text-amber-800 leading-relaxed">Sistem hitung otomatis per kepala. Laporan bug: <span class="font-bold underline text-amber-900">adien.m@email.com</span></p>
            </div>
            
            <button onclick="document.getElementById('welcomeOverlay').remove()" class="btn-prime w-full uppercase tracking-widest text-xs">Masuk ke Kalkulator</button>
        </div>
    </div>

    <header class="bg-white border-b border-slate-100 py-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter">Kalkulator Waris <span class="text-blue-600">by Adien</span></h1>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border px-3 py-1 rounded-full">BETA EDITION</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-8">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">💰 DATA ASET</h3>
                    <div class="space-y-4">
                        <input type="text" id="hartaRaw" class="input-rupiah" placeholder="Total Harta Bruto" oninput="AdienFinal.mask(this)">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="utangRaw" class="input-rupiah" placeholder="Utang" oninput="AdienFinal.mask(this)">
                            <input type="text" id="biayaRaw" class="input-rupiah" placeholder="Biaya Wasiat" oninput="AdienFinal.mask(this)">
                        </div>
                        <div class="flex gap-4 p-2 bg-slate-50 rounded-2xl">
                            <label class="flex-1 p-3 flex items-center gap-2 cursor-pointer text-xs font-bold">
                                <input type="checkbox" id="isGono" onchange="AdienFinal.calculate()"> Gono-Gini
                            </label>
                            <label class="flex-1 p-3 flex items-center gap-2 cursor-pointer text-xs font-bold">
                                <input type="checkbox" id="isZakat" onchange="AdienFinal.calculate()"> Zakat (2.5%)
                            </label>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-8">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">👥 AHLI WARIS UTAMA</h3>
                    <div class="space-y-4">
                        <select id="genderP" class="input-rupiah" onchange="AdienFinal.calculate()">
                            <option value="none">Pilih Pasangan</option>
                            <option value="istri">Istri</option>
                            <option value="suami">Suami</option>
                        </select>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="al" class="input-rupiah" placeholder="Jml Anak Laki" oninput="AdienFinal.calculate()">
                            <input type="number" id="ap" class="input-rupiah" placeholder="Jml Anak Per" oninput="AdienFinal.calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="p-3 border rounded-xl flex items-center gap-2 cursor-pointer text-xs font-bold">
                                <input type="checkbox" id="hasIbu" onchange="AdienFinal.calculate()"> Ada Ibu
                            </label>
                            <label class="p-3 border rounded-xl flex items-center gap-2 cursor-pointer text-xs font-bold">
                                <input type="checkbox" id="hasAyah" onchange="AdienFinal.calculate()"> Ada Ayah
                            </label>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-8 bg-slate-50/50">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">🧬 GOLONGAN LANJUTAN & ASHOBAH</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="sl" class="input-rupiah bg-white" placeholder="Sdr Laki-laki" oninput="AdienFinal.calculate()">
                            <input type="number" id="sp" class="input-rupiah bg-white" placeholder="Sdr Perempuan" oninput="AdienFinal.calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="p-3 bg-white border rounded-xl flex items-center gap-2 cursor-pointer text-xs font-bold">
                                <input type="checkbox" id="hasKakek" onchange="AdienFinal.calculate()"> Kakek
                            </label>
                            <label class="p-3 bg-white border rounded-xl flex items-center gap-2 cursor-pointer text-xs font-bold">
                                <input type="checkbox" id="hasNenek" onchange="AdienFinal.calculate()"> Nenek
                            </label>
                        </div>
                        <div class="pt-4 border-t border-slate-200">
                            <label class="flex items-center gap-2 mb-3 cursor-pointer text-[10px] font-black uppercase text-slate-500">
                                <input type="checkbox" id="enableGol4" onchange="AdienFinal.toggleGol4(this.checked)"> Aktifkan Paman/Tante (Gol IV)
                            </label>
                            <div id="gol4Container" class="grid grid-cols-2 gap-3 opacity-30 pointer-events-none">
                                <input type="number" id="paman" class="input-rupiah bg-white" placeholder="Jml Paman" disabled oninput="AdienFinal.calculate()">
                                <input type="number" id="tante" class="input-rupiah bg-white" placeholder="Jml Tante" disabled oninput="AdienFinal.calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="glass-card p-8 sticky top-28 border-t-8 border-blue-600">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h2 class="text-3xl font-black tracking-tighter" id="lawModeLabel">Hasil Analisis</h2>
                            <p id="netDisplay" class="text-blue-600 text-lg font-bold">Rp 0</p>
                        </div>
                        <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                            <button id="btnIslam" onclick="AdienFinal.setMode('islam')" class="px-6 py-2.5 rounded-xl text-xs font-black transition tab-active">ISLAM</button>
                            <button id="btnBW" onclick="AdienFinal.setMode('bw')" class="px-6 py-2.5 rounded-xl text-xs font-black transition tab-inactive ml-1">PERDATA</button>
                        </div>
                    </div>

                    <div id="results" class="space-y-4 min-h-[300px]">
                         </div>

                    <div class="mt-6 flex gap-4">
                        <button onclick="AdienFinal.calculate()" class="btn-prime flex-1 shadow-lg shadow-blue-200">HITUNG ULANG</button>
                        <button onclick="AdienFinal.pdf()" class="px-8 bg-slate-900 text-white font-black rounded-2xl hover:bg-black transition">PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const AdienFinal = {
            state: { mode: 'islam', results: [], meta: {} },

            mask(el) {
                let v = el.value.replace(/\D/g, "");
                el.value = v ? new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v) : "";
                this.calculate();
            },

            val(id) { return Math.round(parseFloat(document.getElementById(id).value.replace(/\D/g, "")) || 0); },
            num(id) { return Math.max(0, parseInt(document.getElementById(id).value) || 0); },
            fmt(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(Math.round(n)); },

            toggleGol4(enabled) {
                const c = document.getElementById('gol4Container');
                c.style.opacity = enabled ? '1' : '0.3';
                c.style.pointerEvents = enabled ? 'auto' : 'none';
                document.getElementById('paman').disabled = !enabled;
                document.getElementById('tante').disabled = !enabled;
                this.calculate();
            },

            setMode(m) {
                this.state.mode = m;
                document.getElementById('btnIslam').className = `px-6 py-2.5 rounded-xl text-xs font-black transition ${m==='islam'?'tab-active':'tab-inactive'}`;
                document.getElementById('btnBW').className = `px-6 py-2.5 rounded-xl text-xs font-black transition ${m==='bw'?'tab-active':'tab-inactive'} ml-1`;
                this.calculate();
            },

            calculate() {
                const bruto = this.val('hartaRaw');
                if (bruto === 0) return;
                
                const gono = document.getElementById('isGono').checked ? Math.round(bruto * 0.5) : 0;
                let sisa = bruto - gono - this.val('utangRaw') - this.val('biayaRaw');
                let zakat = (document.getElementById('isZakat').checked && sisa >= 85000000) ? Math.round(sisa * 0.025) : 0;
                sisa -= zakat;

                this.state.meta = { bruto, gono, sisa };
                document.getElementById('netDisplay').innerText = this.fmt(sisa);
                this.state.mode === 'islam' ? this.logicIslam(sisa) : this.logicBW(sisa);
                this.display();
            },

            logicIslam(netto) {
                let res = [], pool = netto;
                const gP = document.getElementById('genderP').value;
                const al = this.num('al'), ap = this.num('ap'), sl = this.num('sl'), sp = this.num('sp');
                const hI = document.getElementById('hasIbu').checked, hA = document.getElementById('hasAyah').checked;
                const hK = document.getElementById('hasKakek').checked, hN = document.getElementById('hasNenek').checked;
                const hasAnak = (al + ap) > 0;

                // 1. DZUL FARAIDH
                if (gP !== 'none') {
                    let f = hasAnak ? (gP === 'istri' ? 1/8 : 1/4) : (gP === 'istri' ? 1/4 : 1/2);
                    let v = Math.round(netto * f); res.push({ n: gP.toUpperCase(), r: 'Faraidh', p: this.getFrac(f), v, count: 1 }); pool -= v;
                }
                if (hI) {
                    let f = (hasAnak || (sl+sp) > 1) ? 1/6 : 1/3;
                    let v = Math.round(netto * f); res.push({ n: 'IBU', r: 'Faraidh', p: this.getFrac(f), v, count: 1 }); pool -= v;
                }
                if (hA && hasAnak) {
                    let v = Math.round(netto * 1/6); res.push({ n: 'AYAH', r: 'Faraidh', p: '1/6', v, count: 1 }); pool -= v;
                }
                if (!hA && hK && hasAnak) {
                    let v = Math.round(netto * 1/6); res.push({ n: 'KAKEK', r: 'Faraidh', p: '1/6', v, count: 1 }); pool -= v;
                }
                if (!hI && hN) {
                    let v = Math.round(netto * 1/6); res.push({ n: 'NENEK', r: 'Faraidh', p: '1/6', v, count: 1 }); pool -= v;
                }

                // 2. ASHOBAH
                if (pool > 0) {
                    if (hasAnak) {
                        let ratio = pool / (al * 2 + ap);
                        if (al > 0) res.push({ n: 'ANAK LAKI-LAKI', r: 'Ashabah', p: '2:1', v: Math.round(ratio * 2 * al), count: al });
                        if (ap > 0) res.push({ n: 'ANAK PEREMPUAN', r: 'Ashabah', p: '2:1', v: Math.round(ratio * ap), count: ap });
                        pool = 0;
                    } else if (hA) {
                        res.push({ n: 'AYAH (SISA)', r: 'Ashabah', p: 'Sisa', v: pool, count: 1 });
                        pool = 0;
                    } else if (sl + sp > 0) {
                        let ratio = pool / (sl * 2 + sp);
                        if (sl > 0) res.push({ n: 'SDR LAKI-LAKI', r: 'Ashabah', p: '2:1', v: Math.round(ratio * 2 * sl), count: sl });
                        if (sp > 0) res.push({ n: 'SDR PEREMPUAN', r: 'Ashabah', p: '2:1', v: Math.round(ratio * sp), count: sp });
                        pool = 0;
                    } else if (hK) {
                        res.push({ n: 'KAKEK (SISA)', r: 'Ashabah', p: 'Sisa', v: pool, count: 1 });
                        pool = 0;
                    }
                }
                if (pool > 0 && res.length > 0) res[res.length-1].v += pool;
                this.state.results = res;
            },

            logicBW(netto) {
                let res = [];
                const al = this.num('al'), ap = this.num('ap'), gP = document.getElementById('genderP').value !== 'none';
                const sl = this.num('sl'), sp = this.num('sp'), hI = document.getElementById('hasIbu').checked, hA = document.getElementById('hasAyah').checked;
                if (al + ap + gP > 0) {
                    const c = al + ap + (gP ? 1 : 0);
                    res.push({ n: 'GOLONGAN I', r: 'BW Prio 1', p: `1/${c}`, v: netto, count: c });
                } else if (sl + sp + hI + hA > 0) {
                    const c = sl + sp + (hI ? 1 : 0) + (hA ? 1 : 0);
                    res.push({ n: 'GOLONGAN II', r: 'BW Prio 2', p: `1/${c}`, v: netto, count: c });
                } else if (this.num('paman') + this.num('tante') > 0) {
                    const c = this.num('paman') + this.num('tante');
                    res.push({ n: 'GOLONGAN IV', r: 'BW Prio 4', p: `1/${c}`, v: netto, count: c });
                }
                this.state.results = res;
            },

            getFrac(f) { return f === 1/8 ? '1/8' : f === 1/4 ? '1/4' : f === 1/2 ? '1/2' : f === 1/6 ? '1/6' : f === 1/3 ? '1/3' : 'Sisa'; },

            display() {
                const box = document.getElementById('results'); box.innerHTML = '';
                this.state.results.forEach(r => {
                    const pk = Math.round(r.v / r.count);
                    box.innerHTML += `
                    <div class="p-6 bg-white border border-slate-100 rounded-2xl flex justify-between items-center res-item ${r.r==='Faraidh'?'gol-prio':'gol-ashaba'}">
                        <div>
                            <p class="font-black text-sm text-slate-900">${r.n} <span class="text-blue-600 text-[10px] ml-1">x${r.count}</span></p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mt-1">Dasar: ${r.p}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono font-black text-blue-600 text-lg">${this.fmt(pk)}</p>
                            <p class="text-[8px] text-slate-400 font-black uppercase">Per Kepala</p>
                        </div>
                    </div>`;
                });
            },

            pdf() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFont(undefined, 'bold');
                doc.text('LAPORAN KALKULATOR WARIS BY ADIEN - BETA', 105, 20, { align: 'center' });
                doc.autoTable({
                    startY: 35,
                    head: [['Penerima', 'Jml', 'Total Grup', 'Per Kepala']],
                    body: this.state.results.map(r => [r.n, r.count, this.fmt(r.v), this.fmt(r.v/r.count)])
                });
                doc.save(`Waris_Adien_Beta_${Date.now()}.pdf`);
            }
        };
    </script>
</body>
</html>
