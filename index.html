<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Waris by Adien - Beta Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #000000; 
            --card: #0a0a0a; 
            --text: #ffffff; 
            --border: #1a1a1a;
            --accent-blue: #3b82f6;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            overflow-x: hidden; 
        }

        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            box-shadow: 0 0 20px rgba(0,0,0,1); 
        }

        .input-dark { 
            width: 100%; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 14px 18px; 
            outline: none; 
            transition: 0.3s; 
            background: #050505; 
            color: white; 
            font-weight: 500;
        }

        .input-dark:focus { 
            border-color: var(--accent-blue); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); 
        }

        .btn-prime { 
            background: var(--accent-blue); 
            color: white; 
            font-weight: 800; 
            padding: 18px; 
            border-radius: 14px; 
            width: 100%; 
            transition: 0.3s; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
        }

        .btn-prime:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            transform: scale(1.01);
        }

        /* Tooltip & Icon Style */
        .q-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: #111;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 800;
            cursor: help;
            margin-left: 6px;
            transition: 0.3s;
        }

        .tooltip { position: relative; display: inline-block; }
        .tooltip .tooltiptext { 
            visibility: hidden; 
            width: 180px; 
            background-color: #111; 
            color: #fff; 
            border-radius: 8px; 
            padding: 10px; 
            position: absolute; 
            z-index: 100; 
            bottom: 150%; 
            left: 50%; 
            transform: translateX(-50%);
            opacity: 0; 
            transition: 0.3s; 
            border: 1px solid var(--accent-blue); 
            font-size: 10px;
            font-weight: 400;
            line-height: 1.4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        .tab-active { background: var(--accent-blue); color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .tab-inactive { background: #111111; color: #555555; }
        .res-item { border: 1px solid var(--border); background: #050505; border-radius: 16px; margin-bottom: 12px; }
        .gol-prio { border-left: 4px solid var(--accent-blue); }
    </style>
</head>
<body>

    <header class="bg-black border-b border-white/5 py-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-white">Adien<span class="text-blue-500">Waris.</span></h1>
            <span class="text-[9px] font-black text-blue-500 border border-blue-500/20 px-3 py-1 rounded-full uppercase tracking-widest">Beta Edition</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div class="lg:col-span-5 space-y-8">
                <div class="glass-card p-8">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Data Keuangan</h3>
                    <div class="space-y-4">
                        <input type="text" id="hartaRaw" class="input-dark" placeholder="Total Harta Bruto" oninput="AdienFinal.mask(this)">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="utangRaw" class="input-dark" placeholder="Hutang" oninput="AdienFinal.mask(this)">
                            <input type="text" id="biayaRaw" class="input-dark" placeholder="Wasiat/Lainnya" oninput="AdienFinal.mask(this)">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-8">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Keluarga Inti</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Pasangan 
                                <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Istri (Janda) atau Suami (Duda) yang ditinggalkan.</span></span>
                            </label>
                            <select id="genderP" class="input-dark" onchange="AdienFinal.calculate()">
                                <option value="none">TIDAK ADA</option>
                                <option value="istri">ISTRI</option>
                                <option value="suami">SUAMI</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Anak Laki 
                                    <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Ahli waris ashabah (penerima sisa) utama.</span></span>
                                </label>
                                <input type="number" id="al" class="input-dark" placeholder="0" oninput="AdienFinal.calculate()">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Anak Per 
                                    <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Mendapat bagian tetap atau sisa jika ada anak laki-laki.</span></span>
                                </label>
                                <input type="number" id="ap" class="input-dark" placeholder="0" oninput="AdienFinal.calculate()">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-8">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Keluarga Lainnya</h3>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <label class="p-4 bg-black border border-white/5 rounded-xl flex items-center justify-between cursor-pointer hover:border-blue-500/50 transition">
                                <span class="text-[10px] font-bold uppercase tracking-wider">Ibu 
                                    <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Mendapat 1/6 jika ada anak, atau 1/3 jika tidak ada anak.</span></span>
                                </span>
                                <input type="checkbox" id="hasIbu" onchange="AdienFinal.calculate()" class="accent-blue-500 w-4 h-4">
                            </label>
                            <label class="p-4 bg-black border border-white/5 rounded-xl flex items-center justify-between cursor-pointer hover:border-blue-500/50 transition">
                                <span class="text-[10px] font-bold uppercase tracking-wider">Ayah 
                                    <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Mendapat 1/6 jika ada anak laki-laki.</span></span>
                                </span>
                                <input type="checkbox" id="hasAyah" onchange="AdienFinal.calculate()" class="accent-blue-500 w-4 h-4">
                            </label>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Sdr Laki 
                                    <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Hanya mendapat waris jika tidak ada anak laki-laki atau ayah.</span></span>
                                </label>
                                <input type="number" id="sl" class="input-dark" placeholder="0" oninput="AdienFinal.calculate()">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Sdr Per 
                                    <span class="tooltip"><span class="q-icon">?</span><span class="tooltiptext">Hanya mendapat waris jika tidak ada anak laki-laki atau ayah.</span></span>
                                </label>
                                <input type="number" id="sp" class="input-dark" placeholder="0" oninput="AdienFinal.calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="glass-card p-10 border-blue-500/20">
                    <div class="flex justify-between items-start mb-10">
                        <div>
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.5em] mb-2">Harta Bersih</p>
                            <h2 id="netDisplay" class="text-4xl font-black font-mono text-white">Rp 0</h2>
                        </div>
                        <div class="flex bg-black p-1 rounded-lg border border-white/5">
                            <button id="btnIslam" onclick="AdienFinal.setMode('islam')" class="px-6 py-2 rounded-lg text-[10px] font-black tracking-widest tab-active">ISLAM</button>
                            <button id="btnBW" onclick="AdienFinal.setMode('bw')" class="px-6 py-2 rounded-lg text-[10px] font-black tracking-widest tab-inactive ml-1">PERDATA</button>
                        </div>
                    </div>

                    <div id="results" class="min-h-[300px]">
                        </div>

                    <div class="mt-8 pt-8 border-t border-white/5">
                        <button onclick="AdienFinal.pdf()" class="btn-prime">Unduh Laporan PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const AdienFinal = {
            state: { mode: 'islam', results: [] },

            mask(el) {
                let v = el.value.replace(/\D/g, "");
                el.value = v ? new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v) : "";
                this.calculate();
            },

            val(id) { return Math.round(parseFloat(document.getElementById(id).value.replace(/\D/g, "")) || 0); },
            num(id) { return Math.max(0, parseInt(document.getElementById(id).value) || 0); },
            fmt(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(Math.round(n)); },

            setMode(m) {
                this.state.mode = m;
                document.getElementById('btnIslam').className = `px-8 py-3 rounded-xl text-[11px] font-black transition-all ${m==='islam'?'tab-active':'tab-inactive'}`;
                document.getElementById('btnBW').className = `px-8 py-3 rounded-xl text-[11px] font-black transition-all ${m==='bw'?'tab-active':'tab-inactive'} ml-2`;
                this.calculate();
            },

            calculate() {
                const bruto = this.val('hartaRaw');
                const hBersama = document.getElementById('isBersama').checked ? Math.round(bruto * 0.5) : 0;
                let sisa = bruto - hBersama - this.val('utangRaw') - this.val('biayaRaw');
                let zakat = (document.getElementById('isZakat').checked && sisa >= 85000000) ? Math.round(sisa * 0.025) : 0;
                sisa -= zakat;

                document.getElementById('netDisplay').innerText = this.fmt(sisa);
                this.state.mode === 'islam' ? this.logicIslam(sisa) : this.logicBW(sisa);
                
                const disc = document.getElementById('disclaimer');
                const infoText = this.state.mode === 'islam' ? 
                    `Sesuai KHI: Angka merah (Rp 0) berarti terhijab. Jika Ahli Waris muncul dua kali berarti ahli waris tersebut juga mendapatkan bagian sisa (ashabah).` :
                    `Sesuai BW: Mengikuti sistem Golongan Prioritas. Jika Golongan I ada, golongan di bawahnya otomatis Rp 0.`;
                
                disc.innerHTML = `<span class="text-blue-500">INFO:</span> ${infoText}<br><br>
                                  <span class="text-slate-400">PENTING: KALKULASI INI ADALAH ESTIMASI. HARAP KONSULTASI DENGAN NOTARIS/AHLI AGAMA.</span>`;
                this.display();
            
    <script>
        const AdienFinal = {
            state: { mode: 'islam', results: [] },

            mask(el) {
                let v = el.value.replace(/\D/g, "");
                el.value = v ? new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v) : "";
                this.calculate();
            },

            val(id) { return Math.round(parseFloat(document.getElementById(id).value.replace(/\D/g, "")) || 0); },
            num(id) { return Math.max(0, parseInt(document.getElementById(id).value) || 0); },
            fmt(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(Math.round(n)); },

            setMode(m) {
                this.state.mode = m;
                document.getElementById('btnIslam').className = `px-6 py-2.5 rounded-xl text-xs font-black transition ${m==='islam'?'tab-active':'tab-inactive'}`;
                document.getElementById('btnBW').className = `px-6 py-2.5 rounded-xl text-xs font-black transition ${m==='bw'?'tab-active':'tab-inactive'} ml-1`;
                this.calculate();
            },

            calculate() {
                const bruto = this.val('hartaRaw');
                const hBersama = document.getElementById('isBersama').checked ? Math.round(bruto * 0.5) : 0;
                let sisa = bruto - hBersama - this.val('utangRaw') - this.val('biayaRaw');
                let zakat = (document.getElementById('isZakat').checked && sisa >= 85000000) ? Math.round(sisa * 0.025) : 0;
                sisa -= zakat;

                document.getElementById('netDisplay').innerText = this.fmt(sisa);
                this.state.mode === 'islam' ? this.logicIslam(sisa) : this.logicBW(sisa);
                
                const disc = document.getElementById('disclaimer');
                const infoText = this.state.mode === 'islam' ? 
                    `Nominal Merah (Rp 0) menandakan Ahli Waris terhijab (Tertutup) sesuai Kompilasi Hukum Islam; Jika Ahli Waris muncul dua kali berarti ahli waris tersebut juga mendapatkan bagian sisa (ashobah).` :
                    `Nominal Merah (Rp 0) menandakan Ahli Waris tidak mendapatkan bagian karena sistem derajat prioritas golongan KUH Perdata.`;
                
                disc.innerHTML = `📢 <span class="text-blue-400">INFO:</span> ${infoText}<br><br>
                                  ⚠️ <span class="text-blue-400">PENTING:</span> KALKULATOR INI HANYA ALAT BANTU DAN BERSIFAT SIMULASI. KAMI TETAP MEREKOMENDASIKAN BERDISKUSI DENGAN AHLI WARIS, NOTARIS, ATAU TOKOH AGAMA UNTUK KEPUTUSAN FINAL.`;
                
                this.display();
            },
            logicIslam(netto) {
    let res = [], pool = netto;
    
    // Input values
    const gP = document.getElementById('genderP').value;
    const al = this.num('al'), ap = this.num('ap'), sl = this.num('sl'), sp = this.num('sp');
    const pmn = this.num('paman'), tnt = this.num('tante');
    const hI = document.getElementById('hasIbu').checked, hA = document.getElementById('hasAyah').checked;
    const hK = document.getElementById('hasKakek').checked, hN = document.getElementById('hasNenek').checked;
    
    // Kondisi penentu
    const hasKeturunan = (al + ap) > 0;
    const hasSaudaraBanyak = (sl + sp) >= 2;
    const hasSaudara = (sl + sp) > 0;
    const noKeturunanNoAyah = !hasKeturunan && !hA;
    
    // Track double portion
    let ayahDzul = 0, ayahAshab = 0;
    let apDzul = 0, apAshab = 0;
    
    console.log('=== PEMBAGIAN HARTA WARIS ISLAM KHI ===');
    console.log(`Netto: ${netto}, Pool awal: ${pool}`);

    // ================================
    // A. PASANGAN (PRIORITAS 1) - An-Nisa:12, KHI 179-180
    // ================================
    if (gP !== 'none') {
        const bagian = hasKeturunan ? (gP === 'istri' ? '1/8' : '1/4') : (gP === 'istri' ? '1/4' : '1/2');
        const v = Math.round(netto * eval(bagian));
        res.push({ 
            n: gP === 'istri' ? 'ISTRI/JANDA' : 'SUAMI/DUDA', 
            r: `An-Nisa:12, KHI ${gP === 'istri' ? 180 : 179}`, 
            v, count: 1, bagian, type: 'dzul-faraidh'
        });
        pool -= v;
        console.log(`1. ${res[res.length-1].n}: ${v} (${bagian}) | Pool: ${pool}`);
    }

    // ================================
    // B1. ANAK PEREMPUAN - An-Nisa:11, KHI 176
    // ================================
    if (ap > 0 && al === 0) {
        const bagian = ap === 1 ? '1/2' : '2/3';
        apDzul = Math.round(netto * eval(bagian));
        res.push({ 
            n: `ANAK PEREMPUAN (${ap})`, 
            r: 'An-Nisa:11, KHI 176', 
            v: apDzul, count: ap, bagian, type: 'dzul-faraidh'
        });
        pool -= apDzul;
        console.log(`2. ANAK PEREMPUAN (${ap}): ${apDzul} (${bagian}) | Pool: ${pool}`);
    }

    // ================================
    // B3. AYAH KANDUNG - An-Nisa:11, KHI 177
    // ================================
    if (hA) {
        const bagian = hasKeturunan ? '1/6' : '1/3';
        ayahDzul = Math.round(netto * eval(bagian));
        res.push({ 
            n: 'AYAH KANDUNG', 
            r: `An-Nisa:11, KHI 177 (${bagian})`, 
            v: ayahDzul, count: 1, bagian, type: 'dzul-faraidh'
        });
        pool -= ayahDzul;
        console.log(`3. AYAH: ${ayahDzul} (${bagian}) | Pool: ${pool}`);
    }

    // ================================
    // B4. IBU KANDUNG - An-Nisa:11, KHI 178 (3 kondisi)
    // ================================
    if (hI) {
        let v = 0, dasar = '', bagian = '';
        
        if (!hasKeturunan && !hasSaudaraBanyak && !hA) {
            v = Math.round(netto * 1/3); bagian = '1/3'; dasar = 'sendirian';
        } else if ((hasKeturunan || hasSaudaraBanyak) && !hA) {
            v = Math.round(netto * 1/6); bagian = '1/6'; dasar = 'ada anak/saudara banyak';
        } else if (!hasKeturunan && !hasSaudaraBanyak && hA) {
            v = Math.round(pool * 1/3); bagian = '1/3 sisa'; dasar = 'bersama Ayah';
        }
        
        res.push({ 
            n: 'IBU KANDUNG', 
            r: `An-Nisa:11, KHI 178 (${dasar})`, 
            v, count: 1, bagian, type: 'dzul-faraidh'
        });
        pool -= v;
        console.log(`4. IBU: ${v} (${bagian}) | Pool: ${pool}`);
    }

    // ================================
    // B5. SAUDARA SEIBU - An-Nisa:12, KHI 181
    // ================================
    if (noKeturunanNoAyah && hasSaudara) {
        const totalSaudaraSeibu = sl + sp;
        let v = 0, dasar = '';
        
        if (totalSaudaraSeibu === 1) {
            v = Math.round(netto * 1/6); dasar = '1/6 (sendirian)';
        } else if (totalSaudaraSeibu >= 2) {
            v = Math.round(netto * 1/3); dasar = '1/3 (2+ orang)';
        }
        
        if (v > 0) {
            res.push({ 
                n: `SAUDARA SEIBU (${totalSaudaraSeibu})`, 
                r: `An-Nisa:12, KHI 181 (${dasar})`, 
                v, count: totalSaudaraSeibu, type: 'dzul-faraidh'
            });
            pool -= v;
            console.log(`5. SAUDARA SEIBU: ${v} (${dasar}) | Pool: ${pool}`);
        }
    }

    // ================================
    // B6. SAUDARA PEREMPUAN KANDUNG/SEAYAH - An-Nisa:12, KHI 182
    // ================================
    if (noKeturunanNoAyah && sp > 0 && sl === 0) {
        const bagian = sp === 1 ? '1/2' : '2/3';
        const v = Math.round(netto * eval(bagian));
        res.push({ 
            n: `SAUDARA PEREMPUAN (${sp})`, 
            r: `An-Nisa:12, KHI 182 (${bagian})`, 
            v, count: sp, type: 'dzul-faraidh'
        });
        pool -= v;
        console.log(`6. SAUDARA PEREMPUAN: ${v} (${bagian}) | Pool: ${pool}`);
    }

    // ================================
    // ASHABAH - An-Nisa:11,12 + Hadits 01
    // ================================
    if (pool > 0) {
        console.log('=== ASHABAH (Sisa Harta) ===');
        
        if (al > 0) {
            const totalShare = al * 2 + ap;
            const ratio = pool / totalShare;
            const vLaki = Math.round(ratio * 2 * al);
            res.push({ n: `ANAK LAKI-LAKI (${al})`, r: 'Ashabah 2:1 (An-Nisa:11)', v: vLaki, count: al, type: 'ashabah' });
            
            if (ap > 0) {
                apAshab = Math.round(ratio * ap);
                res.push({ n: `ANAK PEREMPUAN (${ap})`, r: 'Ashabah 2:1 (An-Nisa:11)', v: apAshab, count: ap, type: 'ashabah' });
            }
            pool = 0;
        } else if (hA) {
            ayahAshab = pool;
            res.push({ n: 'AYAH KANDUNG', r: 'Ashabah (An-Nisa:11)', v: ayahAshab, count: 1, type: 'ashabah' });
            pool = 0;
        } else if (noKeturunanNoAyah && sl > 0) {
            const totalShare = sl * 2 + sp;
            const ratio = pool / totalShare;
            res.push({ n: `SAUDARA LAKI (${sl})`, r: 'Ashabah 2:1 (An-Nisa:12)', v: Math.round(ratio * 2 * sl), count: sl, type: 'ashabah' });
            pool = 0;
        }
    }

    // ================================
    // HIJAB HIRMAN - HARUS v=0 & BELUM DAPAT BAGIAN
    // ================================
    const hijabCandidates = [];
    
    if (hK && (hasKeturunan || hA) && !res.some(r => r.n.includes('KAKEK') && r.v > 0)) {
        hijabCandidates.push({ n: 'KAKEK', r: 'Hijab Hirman (Anak/Ayah)', v: 0, count: 1, type: 'hijab' });
    }
    if (hN && hI && !res.some(r => r.n.includes('NENEK') && r.v > 0)) {
        hijabCandidates.push({ n: 'NENEK', r: 'Hijab Hirman (Ibu)', v: 0, count: 1, type: 'hijab' });
    }
    if (hasSaudara && (hasKeturunan || hA) && !res.some(r => r.n.includes('SAUDARA') && r.v > 0)) {
        hijabCandidates.push({ n: `SAUDARA (${sl+sp})`, r: 'Hijab Hirman (Anak/Ayah)', v: 0, count: sl+sp, type: 'hijab' });
    }
    if ((pmn + tnt > 0) && (hasKeturunan || hA || hI || hasSaudara) && !res.some(r => r.n.includes('PAMAN') && r.v > 0)) {
        hijabCandidates.push({ n: `PAMAN/TANTE (${pmn+tnt})`, r: 'Hijab Hirman (Ahli Dekat)', v: 0, count: pmn+tnt, type: 'hijab' });
    }
    
    // Tambahkan hanya jika v=0 BENAR-BENAR
    hijabCandidates.forEach(item => res.push(item));

    // ================================
    // BAITULMAL
    // ================================
    if (pool > 0) {
        res.push({ n: 'BAITULMAL', r: 'Sisa Harta (KHI 185)', v: pool, count: 1, type: 'baitulmal' });
    }

    // ================================
    // AUTO SORT: dzul > ashbah > toolbox > hijab > baitulmal
    // ================================
    res.sort((a, b) => {
        const priority = { 'dzul-faraidh': 1, 'ashabah': 2, 'toolbox': 3, 'hijab': 4, 'baitulmal': 5 };
        return (priority[a.type] || 6) - (priority[b.type] || 6);
    });

    console.log('=== HASIL FINAL ===', res);
    this.state.results = res;
},
            logicBW(netto) {
                let res = [];
                const al = this.num('al'), ap = this.num('ap'), gP = document.getElementById('genderP').value !== 'none';
                const sl = this.num('sl'), sp = this.num('sp'), hI = document.getElementById('hasIbu').checked, hA = document.getElementById('hasAyah').checked;
                const hK = document.getElementById('hasKakek').checked, hN = document.getElementById('hasNenek').checked;
                const pmn = this.num('paman'), tnt = this.num('tante');

                if (al + ap + gP > 0) {
                    const c = al + ap + (gP ? 1 : 0);
                    res.push({ n: 'GOLONGAN I', r: 'Ahli Waris Utama', v: netto, count: c });
                    if (sl+sp+hI+hA > 0) res.push({ n: 'GOLONGAN II', r: 'Tertutup Prinsip Derajat', v: 0, count: (sl+sp+(hI?1:0)+(hA?1:0)) });
                    if (hK || hN) res.push({ n: 'GOLONGAN III', r: 'Tertutup Prinsip Derajat', v: 0, count: (hK?1:0)+(hN?1:0) });
                    if (pmn+tnt > 0) res.push({ n: 'GOLONGAN IV', r: 'Tertutup Prinsip Derajat', v: 0, count: pmn+tnt });
                } else if (sl + sp + hI + hA > 0) {
                    const c = sl + sp + (hI ? 1 : 0) + (hA ? 1 : 0);
                    res.push({ n: 'GOLONGAN II', r: 'Ahli Waris Utama', v: netto, count: c });
                    if (hK || hN) res.push({ n: 'GOLONGAN III', r: 'Tertutup Prinsip Derajat', v: 0, count: (hK?1:0)+(hN?1:0) });
                    if (pmn+tnt > 0) res.push({ n: 'GOLONGAN IV', r: 'Tertutup Prinsip Derajat', v: 0, count: pmn+tnt });
                } else if (hK || hN) {
                    const c = (hK?1:0)+(hN?1:0);
                    res.push({ n: 'GOLONGAN III', r: 'Ahli Waris Utama', v: netto, count: c });
                    if (pmn+tnt > 0) res.push({ n: 'GOLONGAN IV', r: 'Tertutup Prinsip Derajat', v: 0, count: pmn+tnt });
                } else if (pmn + tnt > 0) {
                    const c = pmn + tnt;
                    res.push({ n: 'GOLONGAN IV', r: 'Ahli Waris Utama', v: netto, count: c });
                }
                this.state.results = res;
            },

            display() {
                const box = document.getElementById('results'); box.innerHTML = '';
                this.state.results.forEach(r => {
                    const pk = r.v > 0 ? Math.round(r.v / r.count) : 0;
                    const isZero = r.v === 0;
                    box.innerHTML += `
                    <div class="p-5 rounded-2xl flex justify-between items-center res-item ${isZero ? 'gol-zero' : (r.r.includes('Utama') || r.r.includes('Faraidh') ? 'gol-prio' : 'gol-ashaba')}">
                        <div>
                            <p class="font-black text-sm ${isZero ? 'text-slate-500' : 'text-white'}">${r.n} <span class="text-blue-500 text-[10px] ml-1">x${r.count}</span></p>
                            <p class="text-[9px] font-bold text-slate-500 uppercase mt-1">Status: ${r.r}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono font-black ${isZero ? 'text-red-900' : 'text-blue-400'} text-lg">${this.fmt(pk)}</p>
                            <p class="text-[8px] text-slate-500 font-black uppercase">Per Kepala</p>
                        </div>
                    </div>`;
                });
            },

            pdf() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text('LAPORAN ESTIMASI WARIS - KALKULATOR WARIS BY ADIEN', 105, 20, { align: 'center' });
                doc.autoTable({
                    startY: 30,
                    head: [['Penerima', 'Status Hukum', 'Total Grup', 'Per Kepala']],
                    body: this.state.results.map(r => [r.n, r.r, this.fmt(r.v), this.fmt(r.v/r.count)])
                });
                doc.save('Estimasi_Waris_Adien.pdf');
            }
        };
    </script>
</body>
