<!DOCTYPE html>
<html lang="id">
<head>
    <!-- HEAD sama persis -->
</head>
<body>
    <!-- HTML sama persis sampai sebelum </div> sticky top-28" -->
    
    <div class="lg:col-span-7">
        <div class="glass-card p-8 sticky top-28">
            <!-- Results section sama -->
            
            <!-- SCRIPT YANG UDAH DI-FIX -->
            <script>
                function closeWelcome() {
                    document.getElementById('welcomeOverlay').style.display = 'none';
                    AdienFinal.calculate(); // ✅ Auto calc setelah welcome
                }

                const AdienFinal = {
                    ZAKAT_THRESHOLD: 85000000,
                    state: { mode: 'islam', results: [], meta: {} },

                    mask(el) {
                        let v = el.value.replace(/\D/g, "");
                        el.value = v ? new Intl.NumberFormat('id-ID', { 
                            style: 'currency', currency: 'IDR', maximumFractionDigits: 0 
                        }).format(v) : "";
                    },

                    val(id) { 
                        return Math.round(parseFloat(document.getElementById(id).value.replace(/\D/g, "")) || 0); 
                    },
                    num(id) { 
                        return Math.max(0, parseInt(document.getElementById(id).value) || 0); 
                    },
                    fmt(n) { 
                        return new Intl.NumberFormat('id-ID', { 
                            style: 'currency', currency: 'IDR', maximumFractionDigits: 0 
                        }).format(Math.round(n)); 
                    },

                    setMode(m) {
                        this.state.mode = m;
                        document.getElementById('btnIslam').className = `flex-1 py-3 rounded-xl font-bold transition ${m==='islam'?'tab-active':'tab-inactive'}`;
                        document.getElementById('btnBW').className = `flex-1 py-3 rounded-xl font-bold transition ${m==='bw'?'tab-active':'tab-inactive'}`;
                        document.getElementById('lawModeLabel').innerText = m === 'islam' ? 'Kompilasi Hukum Islam (KHI)' : 'KUHPerdata (BW)';
                        this.calculate();
                    },

                    calculate() {
                        const bruto = this.val('hartaRaw');
                        const gono = document.getElementById('isGono').checked ? Math.round(bruto/2) : 0;
                        const utangBiaya = this.val('utangRaw') + this.val('biayaRaw');
                        let sisa = Math.round(bruto - gono - utangBiaya);
                        
                        let zakat = 0;
                        if (document.getElementById('isZakat').checked && sisa >= this.ZAKAT_THRESHOLD) {
                            zakat = Math.round(sisa * 0.025);
                            sisa -= zakat;
                        }

                        this.state.meta = { bruto, gono, utangBiaya, zakat, sisa };
                        document.getElementById('netDisplay').innerText = this.fmt(sisa);
                        
                        if (this.state.mode === 'islam') {
                            this.logicIslam(sisa);
                        } else {
                            this.logicBW(sisa);
                        }
                        this.display();
                    },

                    logicIslam(total) {
                        let res = []; 
                        let pool = total;
                        
                        const al = this.num('al'), ap = this.num('ap'), gP = document.getElementById('genderP').value;
                        const hI = document.getElementById('hasIbu').checked, hA = document.getElementById('hasAyah').checked;
                        const hasAnak = (al + ap) > 0;

                        // ✅ PASANGAN - Fixed fractions
                        if(gP !== 'none') {
                            let frac = hasAnak ? (gP==='istri' ? 1/8 : 1/4) : (gP==='istri' ? 1/4 : 1/2);
                            let v = Math.round(pool * frac);
                            res.push({ n: gP.toUpperCase(), r: 'Zul Faraidh', p: this.fracToStr(frac), v, l: 'KHI' });
                            pool -= v;
                        }

                        // ✅ IBU
                        if(hI && pool > 0) {
                            let frac = hasAnak ? 1/6 : 1/3;
                            let v = Math.round(pool * frac);
                            res.push({ n: 'IBU', r: 'Zul Faraidh', p: this.fracToStr(frac), v, l: 'KHI' });
                            pool -= v;
                        }

                        // ✅ AYAH
                        if(hA && pool > 0) {
                            if(hasAnak) {
                                let v = Math.round(pool / 6);
                                res.push({ n: 'AYAH', r: 'Zul Faraidh', p: '1/6', v, l: 'KHI' });
                                pool -= v;
                            } else {
                                res.push({ n: 'AYAH', r: 'Ashabah', p: 'Sisa', v: pool, l: 'KHI' });
                                pool = 0;
                            }
                        }

                        // ✅ ANAK-ANAK
                        if(pool > 0 && hasAnak) {
                            let totalShares = al * 2 + ap;
                            let shareValue = Math.round(pool / totalShares);
                            
                            if(al > 0) {
                                let v = shareValue * 2 * al;
                                res.push({ n: `ANAK LAKI-LAKI (${al})`, r: 'Ashabah', p: '2:1', v, l: 'KHI' });
                            }
                            if(ap > 0) {
                                let v = shareValue * ap;
                                res.push({ n: `ANAK PEREMPUAN (${ap})`, r: 'Ashabah', p: '2:1', v, l: 'KHI' });
                            }
                            pool = 0; // Harusnya 100%
                        }

                        // ✅ Fix sisa pembulatan
                        if(pool > 0 && res.length > 0) {
                            res[res.length-1].v += pool;
                        }

                        this.state.results = res;
                    },

                    fracToStr(frac) {
                        if(frac === 1/8) return '1/8';
                        if(frac === 1/4) return '1/4';
                        if(frac === 1/6) return '1/6';
                        if(frac === 1/3) return '1/3';
                        if(frac === 1/2) return '1/2';
                        return 'Ashabah';
                    },

                    logicBW(total) {
                        let res = [];
                        const al = this.num('al'), ap = this.num('ap'), hasAnak = (al+ap)>0;
                        const gP = document.getElementById('genderP').value !== 'none';

                        if(hasAnak || gP) {
                            const head = (al+ap) + (gP?1:0);
                            res.push({ n: 'GOLONGAN I', r: 'Keturunan/Pasangan', p: `1/${head}`, v: total, l: 'BW' });
                        } else {
                            const hI = document.getElementById('hasIbu').checked;
                            const hA = document.getElementById('hasAyah').checked;
                            const head = (hI?1:0) + (hA?1:0) || 1;
                            res.push({ n: 'GOLONGAN II', r: 'Orang Tua', p: `1/${head}`, v: total, l: 'BW' });
                        }
                        this.state.results = res;
                    },

                    display() {
                        const box = document.getElementById('results'); 
                        box.innerHTML = '';
                        
                        this.state.results.forEach(r => {
                            box.innerHTML += `
                            <div class="p-5 bg-white border border-slate-100 rounded-2xl flex justify-between items-center">
                                <div>
                                    <p class="font-bold text-sm">${r.n}</p>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase">${r.r} • ${r.p} • ${r.l}</span>
                                </div>
                                <p class="font-mono font-bold text-blue-600">${this.fmt(r.v)}</p>
                            </div>`;
                        });
                        
                        // ✅ Total check
                        const total = this.state.results.reduce((sum, r) => sum + r.v, 0);
                        if(Math.abs(total - this.state.meta.sisa) > 1) {
                            console.warn('❌ Total tidak match:', total, 'vs', this.state.meta.sisa);
                        }
                        
                        document.getElementById('pdfBtn').disabled = this.state.results.length === 0;
                    },

                    pdf() {
                        try {
                            const { jsPDF } = window.jspdf;
                            if (!jsPDF) throw new Error('PDF library gagal load');
                            
                            const doc = new jsPDF('p', 'mm', 'a4');
                            let y = 20;
                            
                            // Title
                            doc.setFontSize(22);
                            doc.setFont(undefined, 'bold');
                            doc.text('LAPORAN WARIS ISLAM/PERDATA', 105, y, { align: 'center' });
                            y += 15;
                            
                            // Meta
                            doc.setFontSize(11);
                            doc.autoTable({
                                startY: y,
                                head: [['RINCIAN HARTA']],
                                body: [
                                    ['Harta Bruto', this.fmt(this.state.meta.bruto)],
                                    ['Gono-Gini', this.fmt(this.state.meta.gono)],
                                    ['Utang+Biaya', this.fmt(this.state.meta.utangBiaya)],
                                    ['Zakat Maal', this.fmt(this.state.meta.zakat)],
                                    ['TOTAL NETTO', this.fmt(this.state.meta.sisa)]
                                ],
                                theme: 'striped',
                                styles: { fontSize: 10, cellPadding: 4 },
                                headStyles: { fillColor: [37, 99, 235] }
                            });
                            y = doc.lastAutoTable.finalY + 10;
                            
                            // Results
                            doc.autoTable({
                                startY: y,
                                head: [['Ahli Waris', 'Hak/Porsi', 'Jumlah']],
                                body: this.state.results.map(r => [r.n, `${r.p} (${r.r})`, this.fmt(r.v)]),
                                theme: 'grid',
                                styles: { fontSize: 9, cellPadding: 3 },
                                headStyles: { fillColor: [37, 99, 235] },
                                columnStyles: { 2: { halign: 'right' } }
                            });
                            
                            // Footer
                            y = doc.lastAutoTable.finalY + 10;
                            doc.setFontSize(8);
                            doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')} | Mode: ${this.state.mode.toUpperCase()}`, 20, y);
                            
                            doc.save(`Waris_${this.state.mode}_${Date.now()}.pdf`);
                        } catch(e) {
                            alert(`❌ PDF Error: ${e.message}\nRefresh halaman & coba lagi`);
                            console.error(e);
                        }
                    }
                };

                // ✅ Init setelah DOM load
                document.addEventListener('DOMContentLoaded', () => {
                    AdienFinal.calculate();
                });
            </script>
        </div>
    </div>
</body>
</html>
