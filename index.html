<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Waris Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --primary: #2563eb;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
}

.card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
}

input {
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
}

button {
    background: var(--primary);
    padding: 12px;
    border-radius: 10px;
    width: 100%;
    font-weight: bold;
}

#welcome {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}
</style>
</head>

<body onload="App.init()">

<div id="welcome">
    <div class="card max-w-md text-center">
        <h2 class="text-xl font-bold mb-3">⚖️ Kalkulator Waris</h2>
        <p class="text-sm mb-4">
        Aplikasi ini masih <b>BETA</b>.  
        Hasil hanya simulasi dan <b>bukan fatwa resmi</b>.
        </p>
        <button onclick="App.start()">Saya Mengerti</button>
    </div>
</div>

<div class="max-w-3xl mx-auto p-6 space-y-4">

<div class="card">
<h3 class="font-bold mb-2">Input</h3>

<input id="harta" placeholder="Harta">
<input id="utang" placeholder="Utang">
<input id="biaya" placeholder="Biaya">

<select id="pasangan">
<option value="none">Tidak Ada Pasangan</option>
<option value="istri">Istri</option>
<option value="suami">Suami</option>
</select>

<label><input type="checkbox" id="ayah"> Ayah</label>
<label><input type="checkbox" id="ibu"> Ibu</label>

<input id="al" type="number" placeholder="Anak laki-laki">
<input id="ap" type="number" placeholder="Anak perempuan">

</div>

<button onclick="App.hitung()">Hitung</button>

<div id="hasil" class="card"></div>

</div>

<script>
const App = {

start() {
    document.getElementById('welcome').style.display='none';
},

init(){},

num(id){
    return parseInt(document.getElementById(id).value)||0;
},

val(id){
    return parseFloat(document.getElementById(id).value)||0;
},

fmt(n){
    return "Rp " + n.toLocaleString("id-ID");
},

hitung(){

let total = this.val("harta") - this.val("utang") - this.val("biaya");

let res = [];
let explanation = [];
let pool = total;

const al = this.num("al");
const ap = this.num("ap");
const hasAnak = (al+ap)>0;

const ayah = document.getElementById("ayah").checked;
const ibu = document.getElementById("ibu").checked;
const pasangan = document.getElementById("pasangan").value;

// === PASANGAN ===
if(pasangan!="none"){
let p = hasAnak ? (pasangan=="istri"?1/8:1/4) : (pasangan=="istri"?1/4:1/2);
let v = total*p;

res.push([pasangan,v]);
pool-=v;

explanation.push(`Pasangan mendapat ${p} karena ${hasAnak?"ada anak":"tidak ada anak"}`);
}

// === IBU ===
if(ibu){
let p = hasAnak ? 1/6 : 1/3;
let v = total*p;

res.push(["Ibu",v]);
pool-=v;

explanation.push(`Ibu mendapat ${p}`);
}

// === AYAH ===
if(ayah){
if(hasAnak){
let v = total*(1/6);
res.push(["Ayah",v]);
pool-=v;

if(al==0 && pool>0){
res.push(["Ayah (Ashabah)",pool]);
explanation.push("Ayah menjadi ashabah karena tidak ada anak laki-laki");
pool=0;
}

}else{
res.push(["Ayah",pool]);
explanation.push("Ayah mengambil seluruh sisa sebagai ashabah");
pool=0;
}
}

// === ANAK ===
if(pool>0 && hasAnak){

let div = (al*2 + ap);

if(div>0){
let share = pool/div;

if(al>0){
res.push([`Anak Laki (${al})`, share*2*al]);
}
if(ap>0){
res.push([`Anak Perempuan (${ap})`, share*ap]);
}

explanation.push("Anak laki-laki mendapat 2 bagian dibanding perempuan");
}

pool=0;
}

// === RADD ===
if(pool>0){
let totalShare = res.reduce((s,r)=>s+r[1],0);

res = res.map(r=>{
return [r[0], r[1] + (r[1]/totalShare)*pool];
});

explanation.push("Sisa dibagikan dengan metode radd");
}

// === OUTPUT ===
let html = "<h3 class='font-bold mb-3'>Hasil</h3>";

res.forEach(r=>{
html += `<div>${r[0]} : ${this.fmt(r[1])}</div>`;
});

html += "<hr class='my-3'>";
html += "<h4 class='font-bold'>Penjelasan (Fatwa Style)</h4>";

explanation.forEach(e=>{
html += `<div>• ${e}</div>`;
});

html += "<hr class='my-3 text-red-400'>";
html += "<div class='text-red-400 text-sm'>DISCLAIMER: Ini hanya simulasi. Sangat disarankan konsultasi dengan ahli.</div>";

document.getElementById("hasil").innerHTML = html;

}

}
</script>

</body>
</html>
