<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Waris Pro - Legal & Syariat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dynamic-island { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        input, select { background: rgba(40, 40, 40, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .collapsible-active { max-height: 1000px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50">
        <div id="island" class="dynamic-island bg-white text-black px-6 py-2 rounded-full shadow-2xl flex items-center gap-3 min-w-[200px] justify-center">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span id="island-text" class="text-sm font-semibold uppercase tracking-widest">Sistem Siap</span>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 mt-16">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="glass-card p-6 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6 flex justify-between items-center">
                    Data Harta & Kewajiban
                    <button onclick="resetAll()" class="text-xs bg-red-900/30 text-red-400 px-3 py-1 rounded-full border border-red-500/20 hover:bg-red-900/50 transition">Reset</button>
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-400 uppercase">Total Harta Bruto (Rp)</label>
                        <input type="number" id="hartaTotal" class="w-full p-3 rounded-xl mt-1 focus:ring-2 focus:ring-white outline-none transition" placeholder="Contoh: 1000000000" oninput="autoSave()">
                    </div>

                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/10">
                        <input type="checkbox" id="isGonoGini" class="w-5 h-5 accent-white" onchange="autoSave()">
                        <label for="isGonoGini" class="text-sm">Harta Gono-Gini (Bagi 2 Pasangan)</label>
                    </div>

                    <div>
                        <label class="text-xs text-gray-400 uppercase">Total Utang & Biaya Jenazah (Rp)</label>
                        <input type="number" id="utangTotal" class="w-full p-3 rounded-xl mt-1 focus:ring-2 focus:ring-white outline-none transition" placeholder="0" oninput="autoSave()">
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/10">
                            <input type="checkbox" id="isZakat" class="w-5 h-5 accent-white" onchange="toggleZakat()">
                            <label for="isZakat" class="text-sm">Hitung Zakat Mal (2,5%)</label>
                        </div>
                        <div id="zakatField" class="hidden pl-4 border-l-2 border-white/10 space-y-2">
                            <label class="text-xs text-gray-400 uppercase italic" id="goldLabel">Harga Emas per Gram (Loading...)</label>
                            <input type="number" id="hargaEmas" class="w-full p-3 rounded-xl mt-1 outline-none transition" placeholder="Mengambil harga...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6">Daftar Ahli Waris</h2>
                <div id="heirsList" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase">Pasangan (Suami/Istri)</label>
                        <div class="flex gap-2">
                            <select id="genderPasangan" class="w-1/3 p-3 rounded-xl outline-none" onchange="autoSave()">
                                <option value="none">Tidak Ada</option>
                                <option value="istri">Istri</option>
                                <option value="suami">Suami</option>
                            </select>
                            <input type="text" id="namaPasangan" class="w-2/3 p-3 rounded-xl outline-none" placeholder="Nama Pasangan" oninput="autoSave()">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Ibu (Alm)</label>
                            <input type="text" id="namaIbu" class="w-full p-3 rounded-xl outline-none mt-1" placeholder="Nama Ibu" oninput="autoSave()">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase">Ayah (Alm)</label>
                            <input type="text" id="namaAyah" class="w-full p-3 rounded-xl outline-none mt-1" placeholder="Nama Ayah" oninput="autoSave()">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/10">
                        <button onclick="toggleCollapse('anakSection')" class="w-full flex justify-between items-center text-sm font-semibold py-2">
                            ANAK & CUCU <span id="anakArrow">▼</span>
                        </button>
                        <div id="anakSection" class="collapsible-content space-y-4 pt-2">
                            <div class="flex gap-2">
                                <input type="number" id="jmlAnakL" class="w-1/2 p-3 rounded-xl outline-none" placeholder="Jml Anak Lk" oninput="renderAnakNames()">
                                <input type="number" id="jmlAnakP" class="w-1/2 p-3 rounded-xl outline-none" placeholder="Jml Anak Pr" oninput="renderAnakNames()">
                            </div>
                            <div id="containerNamaAnak" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="glass-card p-8 rounded-3xl sticky top-24">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold tracking-tight">Kalkulasi Waris</h2>
                    <div class="text-right">
                        <p class="text-xs text-gray-500 uppercase">Harta Bersih Siap Bagi</p>
                        <p id="displayHartaBersih" class="text-3xl font-light">Rp 0</p>
                    </div>
                </div>

                <div id="resultTable" class="space-y-4 mb-8 min-h-[200px]">
                    <p class="text-gray-500 italic text-center py-10">Masukkan data untuk melihat rincian pembagian...</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="calculateWaris()" class="bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all active:scale-95 shadow-xl">HITUNG SEKARANG</button>
                    <button id="btnPDF" onclick="generatePDF()" class="border border-white/20 hover:bg-white/5 py-4 rounded-2xl transition-all disabled:opacity-30" disabled>CETAK PDF FORMAL</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-10 right-10">
        <button onclick="resetAll()" class="w-14 h-14 bg-white/10 hover:bg-red-600 rounded-full backdrop-blur-lg border border-white/20 flex items-center justify-center transition-all group">
            <span class="text-xl group-hover:scale-110 transition">↺</span>
        </button>
    </div>

    <script>
        // --- DATA & STATE ---
        let currentHartaBersih = 0;
        let rincianWaris = [];
        let rincianPotongan = {};

        // --- FETCH HARGA EMAS ---
        async function fetchGoldPrice() {
            const label = document.getElementById('goldLabel');
            const input = document.getElementById('hargaEmas');
            label.innerText = "Mengambil harga emas terbaru...";
            
            try {
                // Simulasi Fetch API Harga Emas Real-time (Antam Estimasi)
                // Di dunia nyata, ini bisa memanggil API seperti Logam Mulia
                await new Promise(r => setTimeout(r, 1500)); 
                const harga = 1350000; // Contoh harga April 2026
                input.value = harga;
                label.innerText = "Harga Emas per Gram (Sistem Otomatis)";
                updateIsland("Harga Emas Terupdate", "green");
            } catch (e) {
                label.innerText = "Gagal ambil harga. Masukkan manual:";
                input.placeholder = "Contoh: 1.300.000";
            }
        }

        function toggleZakat() {
            const field = document.getElementById('zakatField');
            if(document.getElementById('isZakat').checked) {
                field.classList.remove('hidden');
                fetchGoldPrice();
            } else {
                field.classList.add('hidden');
            }
            autoSave();
        }

        function toggleCollapse(id) {
            const el = document.getElementById(id);
            const arrow = document.getElementById('anakArrow');
            el.classList.toggle('collapsible-active');
            arrow.style.transform = el.classList.contains('collapsible-active') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function renderAnakNames() {
            const container = document.getElementById('containerNamaAnak');
            const jmlL = parseInt(document.getElementById('jmlAnakL').value) || 0;
            const jmlP = parseInt(document.getElementById('jmlAnakP').value) || 0;
            container.innerHTML = '';

            for(let i=1; i<=jmlL; i++) {
                container.innerHTML += createInputNama(`Anak Laki-laki ${i}`, `namaAnakL_${i}`, 'bg-blue-900/10');
            }
            for(let i=1; i<=jmlP; i++) {
                container.innerHTML += createInputNama(`Anak Perempuan ${i}`, `namaAnakP_${i}`, 'bg-pink-900/10');
            }
            autoSave();
        }

        function createInputNama(label, id, color) {
            return `<div class="p-3 rounded-xl ${color} border border-white/5">
                        <label class="text-[10px] uppercase text-gray-400">${label}</label>
                        <input type="text" id="${id}" class="w-full bg-transparent border-none text-sm p-1 outline-none" placeholder="Masukkan nama..." oninput="autoSave()">
                    </div>`;
        }

        // --- CORE LOGIC ---
        function calculateWaris() {
            updateIsland("Mengkalkulasi...", "blue");
            
            let hartaTotal = parseFloat(document.getElementById('hartaTotal').value) || 0;
            let gonoGini = 0;
            let utang = parseFloat(document.getElementById('utangTotal').value) || 0;
            let zakat = 0;

            // 1. Gono Gini (Urutan Pertama)
            if(document.getElementById('isGonoGini').checked) {
                gonoGini = hartaTotal / 2;
            }
            let sisaHarta = hartaTotal - gonoGini;

            // 2. Utang
            sisaHarta -= utang;

            if(sisaHarta < 0) {
                showError("Harta habis untuk melunasi kewajiban/utang.");
                return;
            }

            // 3. Zakat (Nishab 85gr Emas)
            if(document.getElementById('isZakat').checked) {
                const hargaEmas = parseFloat(document.getElementById('hargaEmas').value) || 0;
                const nishab = hargaEmas * 85;
                if(sisaHarta >= nishab) {
                    zakat = sisaHarta * 0.025;
                    sisaHarta -= zakat;
                }
            }

            currentHartaBersih = sisaHarta;
            rincianPotongan = { total: hartaTotal, gonoGini, utang, zakat, bersih: sisaHarta };

            // 4. Pembagian Fiqh (Simplified Logika Cucu included)
            distribute(sisaHarta);
            renderResults();
            document.getElementById('btnPDF').disabled = false;
            updateIsland("Perhitungan Selesai", "white");
        }

        function distribute(total) {
            rincianWaris = [];
            const genderPasangan = document.getElementById('genderPasangan').value;
            const namaPasangan = document.getElementById('namaPasangan').value || (genderPasangan === 'suami' ? "Suami" : "Istri");
            const jmlL = parseInt(document.getElementById('jmlAnakL').value) || 0;
            const jmlP = parseInt(document.getElementById('jmlAnakP').value) || 0;
            const hasAnak = (jmlL + jmlP) > 0;

            let sisa = total;

            // Contoh Logika Fiqh Sederhana
            if(genderPasangan === 'istri') {
                let porsi = hasAnak ? 1/8 : 1/4;
                let nilai = total * porsi;
                rincianWaris.push({ nama: namaPasangan, status: 'Istri', porsi: hasAnak ? '1/8' : '1/4', nilai });
                sisa -= nilai;
            } else if(genderPasangan === 'suami') {
                let porsi = hasAnak ? 1/4 : 1/2;
                let nilai = total * porsi;
                rincianWaris.push({ nama: namaPasangan, status: 'Suami', porsi: hasAnak ? '1/4' : '1/2', nilai });
                sisa -= nilai;
            }

            // Anak (Asabah)
            if(hasAnak) {
                let totalBagian = (jmlL * 2) + jmlP;
                let perBagian = sisa / totalBagian;

                for(let i=1; i<=jmlL; i++) {
                    let nama = document.getElementById(`namaAnakL_${i}`)?.value || `Anak Laki ${i}`;
                    rincianWaris.push({ nama, status: 'Anak Laki-laki', porsi: 'Asabah (2x)', nilai: perBagian * 2 });
                }
                for(let i=1; i<=jmlP; i++) {
                    let nama = document.getElementById(`namaAnakP_${i}`)?.value || `Anak Perempuan ${i}`;
                    rincianWaris.push({ nama, status: 'Anak Perempuan', porsi: 'Asabah (1x)', nilai: perBagian });
                }
            }
        }

        function renderResults() {
            document.getElementById('displayHartaBersih').innerText = formatIDR(currentHartaBersih);
            const container = document.getElementById('resultTable');
            container.innerHTML = `<h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Distribusi Ahli Waris</h3>`;
            
            rincianWaris.forEach(item => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 hover:border-white/20 transition">
                        <div>
                            <p class="font-semibold">${item.nama}</p>
                            <p class="text-xs text-gray-400">${item.status} (${item.porsi})</p>
                        </div>
                        <p class="font-mono text-green-400">${formatIDR(item.nilai)}</p>
                    </div>
                `;
            });
        }

        // --- UTILS ---
        function formatIDR(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
        }

        function updateIsland(text, color) {
            const island = document.getElementById('island');
            const txt = document.getElementById('island-text');
            txt.innerText = text;
            island.style.background = color === 'white' ? '#fff' : (color === 'red' ? '#7f1d1d' : (color === 'blue' ? '#1e3a8a' : '#fff'));
            island.style.color = (color === 'white' || color === 'green') ? '#000' : '#fff';
        }

        function showError(msg) {
            updateIsland(msg, "red");
            document.getElementById('resultTable').innerHTML = `<p class="text-red-400 text-center py-10">${msg}</p>`;
        }

        function autoSave() {
            const data = {
                hartaTotal: document.getElementById('hartaTotal').value,
                isGonoGini: document.getElementById('isGonoGini').checked,
                utangTotal: document.getElementById('utangTotal').value,
                isZakat: document.getElementById('isZakat').checked,
                namaPasangan: document.getElementById('namaPasangan').value,
                genderPasangan: document.getElementById('genderPasangan').value,
                jmlAnakL: document.getElementById('jmlAnakL').value,
                jmlAnakP: document.getElementById('jmlAnakP').value
            };
            localStorage.setItem('warisData', JSON.stringify(data));
        }

        function loadSavedData() {
            const saved = localStorage.getItem('warisData');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('hartaTotal').value = data.hartaTotal;
                document.getElementById('isGonoGini').checked = data.isGonoGini;
                document.getElementById('utangTotal').value = data.utangTotal;
                document.getElementById('isZakat').checked = data.isZakat;
                document.getElementById('namaPasangan').value = data.namaPasangan;
                document.getElementById('genderPasangan').value = data.genderPasangan;
                document.getElementById('jmlAnakL').value = data.jmlAnakL;
                document.getElementById('jmlAnakP').value = data.jmlAnakP;
                if(data.isZakat) toggleZakat();
                renderAnakNames();
            }
        }

        function resetAll() {
            if(confirm("Hapus semua data dan mulai baru?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFontSize(18);
            doc.text("LAPORAN FORMAL DISTRIBUSI WARIS", 105, 20, { align: 'center' });
            doc.setFontSize(10);
            doc.text(`Tanggal: ${new Date().toLocaleDateString('id-ID')}`, 105, 27, { align: 'center' });
            
            // Rincian Harta (Itemized)
            doc.setFontSize(12);
            doc.text("I. RINCIAN PERHITUNGAN HARTA", 20, 45);
            const dataHarta = [
                ["Harta Bruto", formatIDR(rincianPotongan.total)],
                ["Potongan Gono-Gini", `(${formatIDR(rincianPotongan.gonoGini)})`],
                ["Kewajiban (Utang/Biaya)", `(${formatIDR(rincianPotongan.utang)})`],
                ["Zakat Mal (2,5%)", `(${formatIDR(rincianPotongan.zakat)})`],
                ["TOTAL HARTA WARIS BERSIH", formatIDR(rincianPotongan.bersih)]
            ];
            doc.autoTable({
                startY: 50,
                head: [['Deskripsi', 'Nilai']],
                body: dataHarta,
                theme: 'striped',
                headStyles: { fillStyle: [40, 40, 40] }
            });

            // Distribusi Ahli Waris
            doc.text("II. DISTRIBUSI AHLI WARIS", 20, doc.lastAutoTable.finalY + 15);
            const dataWaris = rincianWaris.map(item => [item.nama, item.status, item.porsi, formatIDR(item.nilai)]);
            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 20,
                head: [['Nama Ahli Waris', 'Status', 'Bagian', 'Nilai Waris']],
                body: dataWaris,
                theme: 'grid'
            });

            doc.save("Laporan_Waris_Formal.pdf");
            updateIsland("PDF Berhasil Diunduh", "white");
        }

        window.onload = loadSavedData;
    </script>
</body>
</html>
